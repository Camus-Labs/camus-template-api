apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://camus-prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://camus-jaeger:16686
    jsonData: {}
