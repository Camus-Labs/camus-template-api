name: "Custom CodeQL Configuration"

paths-ignore:
  # Auto-generated xUnit entry points in build output trigger false positives
  # (e.g. "missed ternary opportunity"). These are not our source code.
  - "**/bin/**"
  - "**/obj/**"

# Exclude generic catch clause alerts — our Application and Adapter layers
# intentionally catch all exceptions at service boundaries to wrap
# infrastructure failures with business context before rethrowing.
# See: docs/architecture.md (error handling conventions)
query-filters:
  - exclude:
      id: cs/catch-of-all-exceptions
