name: Build & Deploy

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unit-test:
    uses: ./.github/workflows/ci-unit-test.yml

  integration-test:
    uses: ./.github/workflows/ci-integration-test.yml

  build:
    needs: [unit-test, integration-test]
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Login to ACR via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACR_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SHARED_SUBSCRIPTION_ID }}

      - name: Determine image tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          IMAGE="crcamus.azurecr.io/ca-template:${IMAGE_TAG}"
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"

  deploy-dev:
    needs: build
    runs-on: ubuntu-24.04
    environment: development
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEV_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEV_SUBSCRIPTION_ID }}

      - name: Deploy to development
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          az containerapp update \
            --name cae-camus-dev \
            --resource-group rg-camus-dev \
            --image "crcamus.azurecr.io/ca-template:${IMAGE_TAG}"

  deploy-prod:
    needs: [build, deploy-dev]
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.PROD_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PROD_SUBSCRIPTION_ID }}

      - name: Deploy to production
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          az containerapp update \
            --name cae-camus-prod \
            --resource-group rg-camus-prod \
            --image "crcamus.azurecr.io/ca-template:${IMAGE_TAG}"
