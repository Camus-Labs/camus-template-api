name: CI Unit Test

on:
  pull_request:
    branches:
      - main

jobs:
  unit-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/UnitTests.slnf

      - name: Build solution
        run: dotnet build src/UnitTests.slnf -c Release --no-restore

      - name: Run unit tests with coverage
        run: >
          dotnet test src/UnitTests.slnf
          -c Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --results-directory ./TestResults

      - name: Enforce coverage threshold
        run: |
          THRESHOLD=80

          dotnet tool install --global dotnet-coverage

          dotnet-coverage merge ./TestResults/**/coverage.cobertura.xml \
            --output ./TestResults/merged.cobertura.xml \
            --output-format cobertura

          REPORT="./TestResults/merged.cobertura.xml"

          if [[ ! -f "$REPORT" ]]; then
            echo "❌ ERROR: Merged coverage report not found."
            exit 1
          fi

          LINE_RATE=$(grep -oP '<coverage[^>]+line-rate="\K[0-9.]+' "$REPORT" | head -1)

          if [[ -z "$LINE_RATE" ]]; then
            echo "❌ ERROR: Could not parse line-rate from coverage report."
            exit 1
          fi

          COVERAGE=$(awk "BEGIN { printf \"%.2f\", $LINE_RATE * 100 }")

          echo "📊 Line coverage: ${COVERAGE}%"
          echo "📏 Threshold:     ${THRESHOLD}%"

          PASS=$(awk "BEGIN { print ($COVERAGE >= $THRESHOLD) ? 1 : 0 }")

          if [[ "$PASS" -ne 1 ]]; then
            echo ""
            echo "❌ FAILED: Coverage ${COVERAGE}% is below the ${THRESHOLD}% minimum."
            exit 1
          fi

          echo ""
          echo "✅ PASSED: Coverage ${COVERAGE}% meets the ${THRESHOLD}% minimum."
