name: Validate PR Branches

# Enforce the release-centric branching model:
#   - PRs to `main` must come from `release/vX.Y.Z` (or `hotfix/<slug>` for emergency fixes)
#   - PRs to `release/vX.Y.Z` must come from `feat/<slug>`, `fix/<slug>`, `chore/<slug>`, or `docs/<slug>`
#   - Source branch names must match their kebab-case slug pattern

on:
  pull_request:
    branches:
      - main
      - 'release/v*'

jobs:
  validate-branches:
    name: Validate source and target branches
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch names
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
          TARGET_BRANCH: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          echo "Source branch: $SOURCE_BRANCH"
          echo "Target branch: $TARGET_BRANCH"

          RELEASE_PATTERN='^release/v[0-9]+\.[0-9]+\.[0-9]+$'
          HOTFIX_PATTERN='^hotfix/[a-z0-9][a-z0-9-]*$'
          FEATURE_PATTERN='^(feat|fix|chore|docs)/[a-z0-9][a-z0-9-]*$'

          if [[ "$TARGET_BRANCH" == "main" ]]; then
            if [[ "$SOURCE_BRANCH" =~ $RELEASE_PATTERN ]] || [[ "$SOURCE_BRANCH" =~ $HOTFIX_PATTERN ]]; then
              echo "OK: '$SOURCE_BRANCH' is allowed to target 'main'."
              exit 0
            fi
            echo "::error::PRs to 'main' must come from 'release/vX.Y.Z' or 'hotfix/<slug>'. Got: '$SOURCE_BRANCH'."
            exit 1
          fi

          if [[ "$TARGET_BRANCH" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            if [[ "$SOURCE_BRANCH" =~ $FEATURE_PATTERN ]]; then
              echo "OK: '$SOURCE_BRANCH' is allowed to target '$TARGET_BRANCH'."
              exit 0
            fi
            echo "::error::PRs to '$TARGET_BRANCH' must come from 'feat/<slug>', 'fix/<slug>', 'chore/<slug>', or 'docs/<slug>'. Got: '$SOURCE_BRANCH'."
            exit 1
          fi

          echo "::error::Unexpected target branch '$TARGET_BRANCH'. Workflow trigger should be reviewed."
          exit 1
