name: Docker Lint

on:
  pull_request:
    branches:
      - main

jobs:
  hadolint:
    name: Lint Docker files
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Lint Dockerfile (production)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Lint Dockerfile.dev (development)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.dev

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config --quiet

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config --quiet
