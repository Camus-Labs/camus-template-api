version: '3.8'

services:
  # Main API - with hot reload and debugging support
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: camus-api-dev
    ports:
      - "5001:80"    # Application port (avoiding conflict with host API on 5001)
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      # OpenTelemetry configuration
      - OpenTelemetry__Tracing__Exporter=otlp
      - OpenTelemetry__Tracing__OtlpEndpoint=http://otel-collector:4317
      - OpenTelemetry__Metrics__Exporter=otlp
      - OpenTelemetry__Metrics__OtlpEndpoint=http://otel-collector:4317
      - OpenTelemetry__Logs__Exporter=otlp
      - OpenTelemetry__Logs__OtlpEndpoint=http://otel-collector:4317
      # Database configuration
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=camus;Username=camus;Password=camus_dev_password
    volumes:
      # Mount source code for hot reload
      - ./src:/src:cached
      # Exclude bin/obj to avoid conflicts
      - /src/Api/emc.main.api/bin
      - /src/Api/emc.main.api/obj
    depends_on:
      - postgres
      - otel-collector
    networks:
      - camus-dev

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: camus-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=camus
      - POSTGRES_USER=camus
      - POSTGRES_PASSWORD=camus_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - camus-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: camus-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    volumes:
      - ./src/Adapters/emc.observability.components/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger
      - loki
    networks:
      - camus-dev

  # Jaeger (Distributed Tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: camus-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC
    environment:
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=500000
    networks:
      - camus-dev

  # Loki (Log Aggregation)
  loki:
    image: grafana/loki:latest
    container_name: camus-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./src/Adapters/emc.observability.components/loki-config.yaml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - camus-dev

  # Prometheus (Metrics Storage)
  prometheus:
    image: prom/prometheus:latest
    container_name: camus-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=1d'
      - '--storage.tsdb.retention.size=1GB'
    ports:
      - "9090:9090"
    volumes:
      - ./src/Adapters/emc.observability.components/prometheus-config.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector
    networks:
      - camus-dev

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: camus-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_USERS_DEFAULT_THEME=dark
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./src/Adapters/emc.observability.components/grafana-config.yaml:/etc/grafana/provisioning/datasources/grafana-config.yaml:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - camus-dev

volumes:
  postgres-data:
  loki-data:
  prometheus-data:
  grafana-data:

networks:
  camus-dev:
    driver: bridge
