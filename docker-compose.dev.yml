name: camus

services:
  # Main API - with hot reload and debugging support
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: camus-app
    ports:
      - "5001:80"    # Application port (avoiding conflict with host API on 5001)
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      # Database host override (container network name instead of localhost)
      - DatabaseSettings__Host=camus-postgres
      # Use PostgreSQL persistence provider
      - DataPersistenceSettings__Provider=PostgreSQL
      # Enable database migrations on startup
      - DBUpSettings__Enabled=true
      # Dapr sidecar host (container name on the network instead of localhost)
      - DaprSecretProviderSettings__BaseHost=camus-dapr-sidecar
      # OpenTelemetry configuration
      - OpenTelemetrySettings__Tracing__Exporter=otlp
      - OpenTelemetrySettings__Tracing__OtlpEndpoint=http://otel-collector:4317
      - OpenTelemetrySettings__Metrics__Exporter=otlp
      - OpenTelemetrySettings__Metrics__OtlpEndpoint=http://otel-collector:4317
      - OpenTelemetrySettings__Logs__Exporter=otlp
      - OpenTelemetrySettings__Logs__OtlpEndpoint=http://otel-collector:4317
    volumes:
      # Mount source code for hot reload
      - ./src:/src:cached
      # Exclude bin/obj to avoid conflicts
      - /src/Api/emc.camus.api/bin
      - /src/Api/emc.camus.api/obj
    depends_on:
      - postgres
      - otel-collector
      - dapr-sidecar
    networks:
      - camus-dev

  # Dapr Sidecar
  dapr-sidecar:
    image: "daprio/daprd:latest"
    container_name: camus-dapr-sidecar
    working_dir: /components
    command:
      [
        "/daprd",
        "--app-id", "camus-app",
        "--app-channel-address", "camus-app",
        "--app-port", "80",
        "--dapr-http-port", "3500",
        "--dapr-grpc-port", "50001",
        "--resources-path", "/components",
      ]
    volumes:
      - ./src/Infrastructure/dapr:/components:ro
    networks:
      - camus-dev

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: camus-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=camus
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # DbUp migrations handle schema - no manual scripts needed
    networks:
      - camus-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: camus-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    volumes:
      - ./src/Infrastructure/observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger
      - loki
    networks:
      - camus-dev

  # Jaeger (Distributed Tracing)
  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: camus-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317"         # OTLP gRPC (internal only, used by otel-collector)
      - "4318"         # OTLP HTTP (internal only)
    networks:
      - camus-dev

  # Loki (Log Aggregation)
  loki:
    image: grafana/loki:latest
    container_name: camus-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./src/Infrastructure/observability/loki-config.yaml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - camus-dev

  # Prometheus (Metrics Storage)
  prometheus:
    image: prom/prometheus:latest
    container_name: camus-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=1d'
      - '--storage.tsdb.retention.size=1GB'
    ports:
      - "9090:9090"
    volumes:
      - ./src/Infrastructure/observability/prometheus-config.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector
    networks:
      - camus-dev

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: camus-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_USERS_DEFAULT_THEME=dark
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./src/Infrastructure/observability/grafana-config.yaml:/etc/grafana/provisioning/datasources/grafana-config.yaml:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - camus-dev

volumes:
  postgres-data:
  loki-data:
  prometheus-data:
  grafana-data:

networks:
  camus-dev:
    driver: bridge
